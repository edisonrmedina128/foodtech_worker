name: CI — foodtech_worker

on:
  push:
    branches: [ main, develop, 001-worker-health-check ]
  pull_request:
    branches: [ main, develop ]

jobs:

  # ─── Job 1: Unit Tests (Caja Blanca — sin infraestructura) ──────────────────
  unit-tests:
    name: Unit Tests (No Spring Context)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Run unit tests + JaCoCo
        run: ./gradlew test jacocoTestReport --no-daemon

      - name: Upload JaCoCo HTML report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html/

      - name: Upload JaCoCo XML (for coverage badge)
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-xml
          path: build/reports/jacoco/test/jacocoTestReport.xml

  # ─── Job 2: Integration Tests (con Postgres + RabbitMQ) ─────────────────────
  integration-tests:
    name: Integration Tests (With Infrastructure)
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: foodtech_db
          POSTGRES_USER: foodtech_user
          POSTGRES_PASSWORD: foodtech_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Run integration tests
        run: ./gradlew test --no-daemon -PincludeIntegration=true
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/foodtech_db
          SPRING_DATASOURCE_USERNAME: foodtech_user
          SPRING_DATASOURCE_PASSWORD: foodtech_pass
          SPRING_RABBITMQ_HOST: localhost
          SPRING_RABBITMQ_PORT: 5672

  # ─── Job 3: Docker Build + Vulnerability Scan ────────────────────────────────
  docker-build-scan:
    name: Docker Build & Security Scan
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t foodtech-worker:ci .

      - name: Install Trivy (vulnerability scanner)
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Scan image for vulnerabilities
        run: trivy image --exit-code 0 --severity HIGH,CRITICAL --format table foodtech-worker:ci
