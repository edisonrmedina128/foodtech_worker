spring.application.name=foodtech_worker
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/foodtech_db
spring.datasource.username=foodtech_user
spring.datasource.password=foodtech_pass

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
foodtech.rabbitmq.queue=foodtech.queue
foodtech.rabbitmq.exchange=foodtech.exchange
foodtech.rabbitmq.routingkey=foodtech.routingkey
foodtech.outbox.max-attempts=10
foodtech.outbox.scheduler-rate=3000
logging.level.com.foodtech.kitchen.worker.foodtech_worker.infrastructure.adapters.input.scheduler=DEBUG

# Actuator - Health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.endpoint.health.status.order=DOWN,WARN,UP,UNKNOWN

# Custom health thresholds (configurable without code changes)
foodtech.health.warn-threshold=10
foodtech.health.down-threshold=20
foodtech.health.scheduler-timeout-seconds=30

