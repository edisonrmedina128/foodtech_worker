spring.application.name=foodtech_worker
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/foodtech_db
spring.datasource.username=foodtech_user
spring.datasource.password=foodtech_pass

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
foodtech.rabbitmq.queue=foodtech.queue
foodtech.rabbitmq.exchange=foodtech.exchange
foodtech.rabbitmq.routingkey=foodtech.routingkey
logging.level.com.foodtech.kitchen.worker.foodtech_worker.infrastructure.adapters.input.scheduler=DEBUG

