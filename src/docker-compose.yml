version: '3.9'

services:

  postgres:
    image: postgres:16
    container_name: foodtech-postgres
    restart: always
    environment:
      POSTGRES_DB: foodtech_db
      POSTGRES_USER: foodtech_user
      POSTGRES_PASSWORD: foodtech_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: foodtech-rabbit
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  pgdata:
  rabbitmq_data:
